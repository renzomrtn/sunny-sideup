version: "3.9"
services:

  # ── Infrastructure ────────────────────────────────────────────────────────

  db:
    image: postgres:16-alpine
    container_name: pmm_youth_db
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGTZ:              Asia/Manila
    command: ["-c", "timezone=Asia/Manila"]
    volumes:
      - pmm_postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "7432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d identity_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: pmm_youth_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "7672:5672"
      - "17672:15672"
    volumes:
      - pmm_rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  authentik-db:
    image: postgres:16-alpine
    container_name: pmm_authentik_db
    environment:
      POSTGRES_DB:       ${AUTHENTIK_POSTGRES_DB}
      POSTGRES_USER:     ${AUTHENTIK_POSTGRES_USER}
      POSTGRES_PASSWORD: ${AUTHENTIK_DB_PASSWORD}
    volumes:
      - pmm_authentik_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authentik -d authentik"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  authentik-redis:
    image: redis:alpine
    container_name: pmm_authentik_redis
    command: --save 60 1 --loglevel warning
    volumes:
      - pmm_authentik_redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  authentik-server:
    image: ghcr.io/goauthentik/server:2024.12
    container_name: pmm_authentik_server
    command: server
    environment:
      AUTHENTIK_REDIS__HOST:          authentik-redis
      AUTHENTIK_POSTGRESQL__HOST:     authentik-db
      AUTHENTIK_POSTGRESQL__USER:     ${AUTHENTIK_POSTGRES_USER}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_DB_PASSWORD}
      AUTHENTIK_POSTGRESQL__NAME:     ${AUTHENTIK_POSTGRES_DB}
      AUTHENTIK_SECRET_KEY:           ${AUTHENTIK_SECRET_KEY}
      AUTHENTIK_ERROR_REPORTING__ENABLED: "false"
    volumes:
      - pmm_authentik_media:/media
      - pmm_authentik_templates:/templates
    ports:
      - "11000:9000"
      - "11443:9443"
    depends_on:
      authentik-db:    { condition: service_healthy }
      authentik-redis: { condition: service_healthy }
    restart: unless-stopped

  authentik-worker:
    image: ghcr.io/goauthentik/server:2024.12
    container_name: pmm_authentik_worker
    command: worker
    environment:
      AUTHENTIK_REDIS__HOST:          authentik-redis
      AUTHENTIK_POSTGRESQL__HOST:     authentik-db
      AUTHENTIK_POSTGRESQL__USER:     ${AUTHENTIK_POSTGRES_USER}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_DB_PASSWORD}
      AUTHENTIK_POSTGRESQL__NAME:     ${AUTHENTIK_POSTGRES_DB}
      AUTHENTIK_SECRET_KEY:           ${AUTHENTIK_SECRET_KEY}
      AUTHENTIK_ERROR_REPORTING__ENABLED: "false"
    volumes:
      - pmm_authentik_media:/media
      - pmm_authentik_templates:/templates
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      authentik-db:    { condition: service_healthy }
      authentik-redis: { condition: service_healthy }
    restart: unless-stopped

  # ── Core Services ─────────────────────────────────────────────────────────

  identity-service:
    build:
      context: ./services/identity-service
      dockerfile: Dockerfile
    container_name: pmm_youth_identity_service
    command: >
      sh -c "python -m app.domains.identity.seed &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    env_file: ./services/identity-service/.env
    depends_on:
      db:               { condition: service_healthy }
      rabbitmq:         { condition: service_healthy }
      authentik-server: { condition: service_started }
    ports:
      - "9200:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  eventing-service:
    build:
      context: ./services/eventing-service
      dockerfile: Dockerfile
    container_name: pmm_youth_eventing_service
    env_file: ./services/eventing-service/.env
    depends_on:
      db:       { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    restart: unless-stopped

  # ── Future Services (scaffolded) ──────────────────────────────────────────

  project-service:
    build:
      context: ./services/project-service
      dockerfile: Dockerfile
    container_name: pmm_youth_project_service
    env_file: ./services/project-service/.env
    depends_on:
      db:       { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    ports:
      - "9201:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  cms-service:
    build:
      context: ./services/cms-service
      dockerfile: Dockerfile
    container_name: pmm_youth_cms_service
    env_file: ./services/cms-service/.env
    depends_on:
      db:       { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    ports:
      - "8014:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ── Frontends ─────────────────────────────────────────────────────────────

  youth-accmgmtsys:
    build:
      context: ./frontends/youth-accmgmtsys
      dockerfile: Dockerfile
    container_name: pmm_youth_accmgmtsys
    ports:
      - "8090:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - identity-service
    restart: unless-stopped

  youth-mainsys:
    build:
      context: ./frontends/youth-mainsys
      dockerfile: Dockerfile
    container_name: pmm_mainsys
    env_file: ./frontends/youth-mainsys/.env
    ports:
      - "8091:80"
    volumes:
      - ./nginx/nginx-mainsys.conf:/etc/nginx/http.d/default.conf:ro
    depends_on:
      - identity-service
      - project-service
      - cms-service
    restart: unless-stopped

  # Not in use
  # youth-portalsys:
  #  build:
  #    context: ./frontends/youth-portalsys
  #    dockerfile: Dockerfile
  #  container_name: pmm_portalsys
  #  env_file: ./frontends/youth-portalsys/.env
  #  ports:
  #    - "8092:80"
  #  volumes:
  #    - ./nginx/nginx-portalsys.conf:/etc/nginx/http.d/default.conf:ro
  #  depends_on:
  #    - cms-service
  #  restart: unless-stopped

# ── Volumes ───────────────────────────────────────────────────────────────

volumes:
  pmm_postgres_data:
    driver: local
  pmm_rabbitmq_data:
    driver: local
  pmm_authentik_postgres_data:
    driver: local
  pmm_authentik_redis_data:
    driver: local
  pmm_authentik_media:
    driver: local
  pmm_authentik_templates:
    driver: local
